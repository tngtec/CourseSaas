<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href="bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styleregistro.css" />
 <!-- Formulario para que nuevos usuarios se registren:-->
 
</head>
<body>
  <div class="container">
    <div class="register-container text-center">
      <img src="img/uneg.jpeg" alt="Logo" class="logo" />
      <h4 class="mb-4">Registro de Nuevo Usuario</h4>
      <form id="registroForm" action="registrar.php"   class="needs-validation" novalidate method="POST" autocomplete="off">
        <div class="form-group mb-3 text-start">
          <label for="nombre"><strong>Nombre completo</strong></label>
          <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
          <div class="invalid-feedback">Ingresa tu nombre completo</div>
        </div>

        <div class="form-group mb-3 text-start">
          <label for="correo"><strong>Correo electrónico</strong></label>
          <input type="email" class="form-control" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
          <div class="invalid-feedback">Ingresa un correo válido.</div>
        </div>

        <div class="form-group mb-3 text-start position-relative">
          <label for="clave"><strong>Contraseña</strong></label>
          <input type="password" class="form-control" id="clave" name="clave" autocomplete="new-password" required>
          <i class="fa fa-eye position-absolute" id="iconoClave" onclick="toggleClave()" style="top: 38px; right: 15px; cursor: pointer; display: none;"></i>
          <div class="invalid-feedback">Debe tener al menos 6 caracteres.</div>
        </div>

        <button type="submit" class="btn btn-success w-100" aria-label="Registrarse">Registrarse</button>
      </form>

      <p class="mt-3">¿Ya tienes cuenta? <a href="login.php" class="link-login">Inicia sesión</a></p>
      


    </div>
  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="validadorregistro.js"></script>


</body>
</html>
